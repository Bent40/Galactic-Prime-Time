<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Eyes Following Mouse</title>
  <style>
    body {
      margin: 0;
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      gap: 40px;
    }
  </style>
</head>
<body>
  <svg id="left-eye" width="120" height="120" viewBox="0 0 120 120">
    <!-- Eyeball -->
    <circle cx="60" cy="60" r="55" fill="white" stroke="#333" stroke-width="3"/>
    <!-- Pupil -->
    <circle class="pupil" cx="60" cy="60" r="22" fill="#1a1a2e"/>
    <!-- Shine -->
    <circle class="shine" cx="68" cy="52" r="7" fill="white" opacity="0.6"/>
  </svg>

  <svg id="right-eye" width="120" height="120" viewBox="0 0 120 120">
    <!-- Eyeball -->
    <circle cx="60" cy="60" r="55" fill="white" stroke="#333" stroke-width="3"/>
    <!-- Pupil -->
    <circle class="pupil" cx="60" cy="60" r="22" fill="#1a1a2e"/>
    <!-- Shine -->
    <circle class="shine" cx="68" cy="52" r="7" fill="white" opacity="0.6"/>
  </svg>

  <script>
    const eyes = [
      document.getElementById('left-eye'),
      document.getElementById('right-eye')
    ];

    document.addEventListener('mousemove', (e) => {
      eyes.forEach(eye => {
        const rect = eye.getBoundingClientRect();
        const eyeCenterX = rect.left + rect.width / 2;
        const eyeCenterY = rect.top + rect.height / 2;

        const dx = e.clientX - eyeCenterX;
        const dy = e.clientY - eyeCenterY;
        const angle = Math.atan2(dy, dx);

        // Max distance the pupil can travel from center (in SVG units)
        const maxDist = 22;
        const dist = Math.min(Math.hypot(dx, dy) / 5, maxDist);

        const pupilX = 60 + dist * Math.cos(angle);
        const pupilY = 60 + dist * Math.sin(angle);

        const pupil = eye.querySelector('.pupil');
        const shine = eye.querySelector('.shine');

        pupil.setAttribute('cx', pupilX);
        pupil.setAttribute('cy', pupilY);

        // Move shine relative to pupil
        shine.setAttribute('cx', pupilX + 8);
        shine.setAttribute('cy', pupilY - 8);
      });
    });
  </script>
</body>
</html>
