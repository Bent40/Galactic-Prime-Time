      // ─── INVENTORY TAB ────────────────────────────────────────────────────────────
      function InventoryTab({ state, update }) {
        const [popup, setPopup] = useState(null); // { item, catId }
        const dragItem = useRef(null);
        const dragCat = useRef(null);

        const cats = state.inventory?.categories || [];
        const equipped = cats.find((c) => c.id === 1) || {
          id: 1,
          name: "Equipped",
          items: [],
        };
        const hotbar = cats.find((c) => c.id === 2) || {
          id: 2,
          name: "Hotbar",
          items: [],
        };
        const freeCats = cats
          .filter((c) => c.id !== 1 && c.id !== 2)
          .sort((a, b) => (a.order || 0) - (b.order || 0));

        function mutateCats(fn) {
          update((s) => ({
            ...s,
            inventory: {
              ...s.inventory,
              categories: fn(s.inventory?.categories || []),
            },
          }));
        }
        function patchCatName(catId, name) {
          mutateCats((cs) =>
            cs.map((c) => (c.id === catId ? { ...c, name } : c)),
          );
        }
        function addItem(catId) {
          mutateCats((cs) =>
            cs.map((c) =>
              c.id === catId
                ? {
                    ...c,
                    items: [
                      ...(c.items || []),
                      {
                        id: uid(),
                        name: "New Item",
                        icon: "",
                        qty: 1,
                        attackTypes: [],
                        range: "",
                        damage: "",
                        damageType: [],
                        specialEffects: "",
                        resistance: "",
                        requirements: "",
                        description: "",
                        category: "Misc",
                      },
                    ],
                  }
                : c,
            ),
          );
        }
        function updateItem(catId, updatedItem) {
          mutateCats((cs) =>
            cs.map((c) =>
              c.id === catId
                ? {
                    ...c,
                    items: (c.items || []).map((i) =>
                      i.id === updatedItem.id ? updatedItem : i,
                    ),
                  }
                : c,
            ),
          );
        }
        function deleteItem(catId, itemId) {
          mutateCats((cs) =>
            cs.map((c) =>
              c.id === catId
                ? {
                    ...c,
                    items: (c.items || []).filter((i) => i.id !== itemId),
                  }
                : c,
            ),
          );
        }
        function moveItem(fromCatId, toCatId, itemId) {
          mutateCats((cs) => {
            const item = cs
              .find((c) => c.id === fromCatId)
              ?.items?.find((i) => i.id === itemId);
            if (!item) return cs;
            return cs.map((c) => {
              if (c.id === fromCatId)
                return {
                  ...c,
                  items: (c.items || []).filter((i) => i.id !== itemId),
                };
              if (c.id === toCatId)
                return { ...c, items: [...(c.items || []), item] };
              return c;
            });
          });
        }
        function addCategory() {
          const maxOrder = Math.max(0, ...cats.map((c) => c.order || 0));
          mutateCats((cs) => [
            ...cs,
            {
              id: uid(),
              name: "New Container",
              locked: false,
              items: [],
              order: maxOrder + 1,
            },
          ]);
        }
        function removeCat(catId) {
          mutateCats((cs) => cs.filter((c) => c.id !== catId));
        }
        function reorderCat(catId, dir) {
          mutateCats((cs) => {
            const sorted = [...cs].sort(
              (a, b) => (a.order || 0) - (b.order || 0),
            );
            const freeOnly = sorted.filter((c) => c.id !== 1 && c.id !== 2);
            const idx = freeOnly.findIndex((c) => c.id === catId);
            if (dir === -1 && idx === 0) return cs;
            if (dir === 1 && idx === freeOnly.length - 1) return cs;
            const swapIdx = idx + dir;
            const a = freeOnly[idx],
              b = freeOnly[swapIdx];
            const aOrd = a.order,
              bOrd = b.order;
            return cs.map((c) =>
              c.id === a.id
                ? { ...c, order: bOrd }
                : c.id === b.id
                  ? { ...c, order: aOrd }
                  : c,
            );
          });
        }

        // Item drag-drop between containers
        function handleItemDragStart(e, catId, itemId) {
          dragItem.current = { catId, itemId };
          e.dataTransfer.effectAllowed = "move";
        }
        function handleItemDrop(e, toCatId) {
          e.preventDefault();
          if (!dragItem.current || dragItem.current.catId === toCatId) return;
          moveItem(dragItem.current.catId, toCatId, dragItem.current.itemId);
          dragItem.current = null;
        }

        function InvBlock({ item, catId }) {
          const icon = item.icon || catIcon(item.category || "default");
          const dmgLbl = itemDmgLabel(item);
          const showQty = (item.qty || 1) > 1;
          return (
            <div
              className="item-block"
              draggable
              onDragStart={(e) => handleItemDragStart(e, catId, item.id)}
              onClick={() => setPopup({ item, catId })}
            >
              <div className="item-block-name">{item.name}</div>
              <div className="item-block-icon">{icon}</div>
              <div className="item-block-footer">
                {dmgLbl && <div className="item-block-dmg">⚔{dmgLbl}</div>}
                {showQty && <div className="item-block-qty">{item.qty}</div>}
              </div>
            </div>
          );
        }

        function CatPanel({
          cat,
          fixed,
          onReorder,
          canUp,
          canDown,
          showReorder,
        }) {
          const [collapsed, setCollapsed] = useState(false);
          return (
            <div
              className="inv-container"
              style={{
                width: fixed ? "100%" : "calc(50% - 5px)",
                minWidth: 200,
                flex: fixed ? "none" : "1 1 200px",
              }}
            >
              <div
                className="inv-container-header"
                onDragOver={(e) => {
                  e.preventDefault();
                }}
                onDrop={(e) => handleItemDrop(e, cat.id)}
                onClick={() => setCollapsed((c) => !c)}
              >
                <span style={{ color: "var(--cyan)", fontSize: 11 }}>
                  {collapsed ? "▶" : "▼"}
                </span>
                <input
                  className="inv-cat-name-in"
                  value={cat.name}
                  onClick={(e) => e.stopPropagation()}
                  onChange={(e) => patchCatName(cat.id, e.target.value)}
                />
                <span className="inv-cat-count">
                  {(cat.items || []).length}
                </span>
                {!fixed && showReorder && (
                  <span
                    style={{ display: "flex", gap: 3 }}
                    onClick={(e) => e.stopPropagation()}
                  >
                    {canUp && (
                      <button
                        className="btn btn-muted btn-xs"
                        onClick={() => onReorder(cat.id, -1)}
                      >
                        ↑
                      </button>
                    )}
                    {canDown && (
                      <button
                        className="btn btn-muted btn-xs"
                        onClick={() => onReorder(cat.id, 1)}
                      >
                        ↓
                      </button>
                    )}
                    <button
                      className="btn btn-danger btn-xs"
                      onClick={() => removeCat(cat.id)}
                    >
                      ✕
                    </button>
                  </span>
                )}
                <button
                  className="btn btn-cyan btn-xs"
                  onClick={(e) => {
                    e.stopPropagation();
                    addItem(cat.id);
                  }}
                >
                  +
                </button>
              </div>
              {!collapsed && (
                <div
                  className="inv-cat-body"
                  onDragOver={(e) => {
                    e.preventDefault();
                  }}
                  onDrop={(e) => handleItemDrop(e, cat.id)}
                >
                  {(cat.items || []).map((item) => (
                    <InvBlock key={item.id} item={item} catId={cat.id} />
                  ))}
                  {(cat.items || []).length === 0 && (
                    <span
                      style={{
                        color: "var(--muted)",
                        fontSize: 10,
                        letterSpacing: 1,
                      }}
                    >
                      Empty
                    </span>
                  )}
                </div>
              )}
            </div>
          );
        }

        return (
          <>
            <div className="inv-layout">
              <div className="inv-fixed">
                <CatPanel cat={equipped} fixed />
                <CatPanel cat={hotbar} fixed />
              </div>
              <div className="inv-free">
                {freeCats.map((cat, idx) => (
                  <CatPanel
                    key={cat.id}
                    cat={cat}
                    showReorder={true}
                    canUp={idx > 0}
                    canDown={idx < freeCats.length - 1}
                    onReorder={reorderCat}
                  />
                ))}
                <div
                  style={{
                    display: "flex",
                    alignItems: "center",
                    alignSelf: "flex-start",
                    marginTop: 4,
                  }}
                >
                  <button
                    className="btn btn-muted btn-sm"
                    onClick={addCategory}
                  >
                    + Container
                  </button>
                </div>
              </div>
            </div>
            {popup && (
              <ItemPopup
                item={popup.item}
                catId={popup.catId}
                cats={cats}
                onClose={() => setPopup(null)}
                onUpdate={updateItem}
                onDelete={deleteItem}
                onMove={moveItem}
              />
            )}
          </>
        );
      }

      // ─── EXPOSURE TAB ─────────────────────────────────────────────────────────────
      function ExposureTab({ state, update }) {
        const portraitRefs = useRef([null, null, null]);
        const [newTag, setNewTag] = useState({ name: "", effect: "" });
        const [tokenForm, setTokenForm] = useState({ tier: "bronze" });

        function patchExposure(k, v) {
          update((s) => ({ ...s, exposure: { ...s.exposure, [k]: v } }));
        }
        function adjustExposure(k, delta) {
          update((s) => ({
            ...s,
            exposure: {
              ...s.exposure,
              [k]: Math.max(0, (s.exposure[k] || 0) + delta),
            },
          }));
        }

        function cycleTag(id) {
          const cycle = ["active", "reinforced", "faded"];
          update((s) => ({
            ...s,
            tags: s.tags.map((t) =>
              t.id === id
                ? {
                    ...t,
                    state: cycle[(cycle.indexOf(t.state) + 1) % cycle.length],
                  }
                : t,
            ),
          }));
        }
        function rmTag(id) {
          update((s) => ({ ...s, tags: s.tags.filter((t) => t.id !== id) }));
        }
        function addTag() {
          if (!newTag.name) return;
          update((s) => ({
            ...s,
            tags: [
              ...s.tags,
              {
                id: uid(),
                name: newTag.name,
                state: "active",
                effect: newTag.effect,
              },
            ],
          }));
          setNewTag({ name: "", effect: "" });
        }

        function patchPatron(rank, k, v) {
          update((s) => ({
            ...s,
            patrons: s.patrons.map((p) =>
              p.rank === rank ? { ...p, [k]: v } : p,
            ),
          }));
        }

        function patchToken(k, v) {
          update((s) => ({ ...s, tokens: { ...s.tokens, [k]: v } }));
        }
        function adjustToken(k, delta) {
          update((s) => ({
            ...s,
            tokens: {
              ...s.tokens,
              [k]: Math.max(0, (s.tokens[k] || 0) + delta),
            },
          }));
        }
        function addBossToken() {
          update((s) => ({
            ...s,
            tokens: {
              ...s.tokens,
              bossTokens: [
                ...(s.tokens.bossTokens || []),
                { id: uid(), tier: tokenForm.tier, used: false },
              ],
            },
          }));
        }
        function toggleBossToken(id) {
          update((s) => ({
            ...s,
            tokens: {
              ...s.tokens,
              bossTokens: (s.tokens.bossTokens || []).map((t) =>
                t.id === id ? { ...t, used: !t.used } : t,
              ),
            },
          }));
        }
        function rmBossToken(id) {
          update((s) => ({
            ...s,
            tokens: {
              ...s.tokens,
              bossTokens: (s.tokens.bossTokens || []).filter(
                (t) => t.id !== id,
              ),
            },
          }));
        }

        const rankLabel = [
          "",
          "🥇 Top Patron",
          "🥈 2nd Patron",
          "🥉 3rd Patron",
        ];
        const rankClass = ["", "r1", "r2", "r3"];

        return (
          <>
            {/* Exposure Counters */}
            <div className="panel">
              <div className="panel-title">Exposure Metrics</div>
              <div className="exposure-counters">
                {["viewers", "followers"].map((k) => (
                  <div key={k} className="exp-counter">
                    <div className="exp-counter-label">
                      {k === "viewers" ? "Viewers" : "Followers"}
                    </div>
                    <div className="exp-counter-val">
                      {state.exposure?.[k] || 0}
                    </div>
                    <div className="exp-counter-btns">
                      <button
                        className="btn-counter"
                        onClick={() => adjustExposure(k, -1)}
                      >
                        −
                      </button>
                      <button
                        className="btn-counter"
                        onClick={() => adjustExposure(k, 1)}
                      >
                        +
                      </button>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* Tags */}
            <div className="panel">
              <div className="panel-title">Tags</div>
              <div className="tags-wrap">
                {(state.tags || []).map((tag) => (
                  <div
                    key={tag.id}
                    className={`tag-chip ${tag.state || "active"}`}
                    onClick={() => cycleTag(tag.id)}
                  >
                    {tag.name}
                    <span className="tag-state-lbl">
                      {tag.state || "active"}
                    </span>
                  </div>
                ))}
                {(!state.tags || state.tags.length === 0) && (
                  <span style={{ color: "var(--muted)", fontSize: 11 }}>
                    No tags.
                  </span>
                )}
              </div>
              <div className="add-form" style={{ marginTop: 8 }}>
                <div className="field-group" style={{ flex: 2 }}>
                  <label className="field-label">Tag Name</label>
                  <input
                    className="fi"
                    value={newTag.name}
                    onChange={(e) =>
                      setNewTag((f) => ({ ...f, name: e.target.value }))
                    }
                  />
                </div>
                <div className="field-group" style={{ flex: 3 }}>
                  <label className="field-label">Effect</label>
                  <input
                    className="fi"
                    value={newTag.effect}
                    onChange={(e) =>
                      setNewTag((f) => ({ ...f, effect: e.target.value }))
                    }
                  />
                </div>
                <button
                  className="btn btn-cyan btn-sm"
                  onClick={addTag}
                  style={{ alignSelf: "flex-end" }}
                >
                  + Tag
                </button>
              </div>
            </div>

            {/* Patrons */}
            <div className="panel">
              <div className="panel-title">Top Patrons</div>
              <div className="patron-list">
                {(state.patrons || []).map((p, idx) => (
                  <div
                    key={p.rank}
                    className={`patron-row ${rankClass[p.rank]}`}
                  >
                    <div>
                      <div
                        className="patron-avatar"
                        onClick={() => portraitRefs.current[idx].click()}
                      >
                        {p.avatar ? (
                          <img src={p.avatar} alt="patron" />
                        ) : (
                          rankLabel[p.rank].split(" ")[0]
                        )}
                      </div>
                      <input
                        ref={(el) => (portraitRefs.current[idx] = el)}
                        type="file"
                        accept="image/*"
                        style={{ display: "none" }}
                        onChange={(e) => {
                          const f = e.target.files[0];
                          if (!f) return;
                          const rd = new FileReader();
                          rd.onload = (ev) =>
                            patchPatron(p.rank, "avatar", ev.target.result);
                          rd.readAsDataURL(f);
                        }}
                      />
                    </div>
                    <div className="patron-fields">
                      <input
                        className="patron-in name-in"
                        placeholder={rankLabel[p.rank]}
                        value={p.name}
                        onChange={(e) =>
                          patchPatron(p.rank, "name", e.target.value)
                        }
                      />
                      <input
                        className="patron-in amount-in"
                        placeholder="Contribution"
                        value={p.amount}
                        onChange={(e) =>
                          patchPatron(p.rank, "amount", e.target.value)
                        }
                      />
                      <input
                        className="patron-in"
                        placeholder="Notes"
                        value={p.notes}
                        onChange={(e) =>
                          patchPatron(p.rank, "notes", e.target.value)
                        }
                      />
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* Tokens */}
            <div className="panel">
              <div className="panel-title">Tokens</div>
              <div className="token-counters">
                {[
                  ["narrative", "Narrative"],
                  ["upgrade", "Upgrade"],
                  ["patronTokens", "Patron"],
                ].map(([k, lbl]) => (
                  <div key={k} className="token-box">
                    <div className="token-box-label">{lbl}</div>
                    <div className="token-box-val">
                      {state.tokens?.[k] || 0}
                    </div>
                    <div className="token-btns">
                      <button
                        className="btn btn-danger btn-xs"
                        onClick={() => adjustToken(k, -1)}
                      >
                        −
                      </button>
                      <button
                        className="btn btn-success btn-xs"
                        onClick={() => adjustToken(k, 1)}
                      >
                        +
                      </button>
                    </div>
                  </div>
                ))}
              </div>
              <hr className="divider" />
              <div className="section-label">Boss Tokens</div>
              <div className="boss-tokens-grid">
                {(state.tokens?.bossTokens || []).map((t) => (
                  <div
                    key={t.id}
                    className={`boss-token t-${t.tier}${t.used ? " used" : ""}`}
                    onClick={() => toggleBossToken(t.id)}
                  >
                    {t.tier[0].toUpperCase()}
                    <button
                      className="boss-token-rm"
                      onClick={(e) => {
                        e.stopPropagation();
                        rmBossToken(t.id);
                      }}
                    >
                      ✕
                    </button>
                  </div>
                ))}
              </div>
              <div className="row gap-sm" style={{ marginTop: 8 }}>
                <select
                  className="mini-select"
                  value={tokenForm.tier}
                  onChange={(e) => setTokenForm({ tier: e.target.value })}
                >
                  {BOSS_TIERS.map((t) => (
                    <option key={t} value={t}>
                      {t.charAt(0).toUpperCase() + t.slice(1)}
                    </option>
                  ))}
                </select>
                <button className="btn btn-cyan btn-sm" onClick={addBossToken}>
                  + Boss Token
                </button>
              </div>
            </div>
          </>
        );
      }

      // ─── OBJECTIVES TAB ──────────────────────────────────────────────────────────
      function ObjectivesTab({ state, update }) {
        const SECTIONS = ["main", "directives", "goals"];
        const LABELS = {
          main: "Main Objectives",
          directives: "Directives",
          goals: "Goals",
        };
        const STATUSES = ["active", "complete", "failed"];

        function addObj(section) {
          update((s) => ({
            ...s,
            objectives: {
              ...s.objectives,
              [section]: [
                ...(s.objectives?.[section] || []),
                {
                  id: uid(),
                  title: "",
                  description: "",
                  status: "active",
                  reward: "",
                  subtasks: [],
                },
              ],
            },
          }));
        }
        function rmObj(section, id) {
          update((s) => ({
            ...s,
            objectives: {
              ...s.objectives,
              [section]: (s.objectives?.[section] || []).filter(
                (o) => o.id !== id,
              ),
            },
          }));
        }
        function patchObj(section, id, k, v) {
          update((s) => ({
            ...s,
            objectives: {
              ...s.objectives,
              [section]: (s.objectives?.[section] || []).map((o) =>
                o.id === id ? { ...o, [k]: v } : o,
              ),
            },
          }));
        }
        function cycleStatus(section, id) {
          update((s) => ({
            ...s,
            objectives: {
              ...s.objectives,
              [section]: (s.objectives?.[section] || []).map((o) => {
                if (o.id !== id) return o;
                const i = STATUSES.indexOf(o.status || "active");
                return { ...o, status: STATUSES[(i + 1) % STATUSES.length] };
              }),
            },
          }));
        }
        function addSubtask(section, objId) {
          update((s) => ({
            ...s,
            objectives: {
              ...s.objectives,
              [section]: (s.objectives?.[section] || []).map((o) =>
                o.id === objId
                  ? {
                      ...o,
                      subtasks: [
                        ...(o.subtasks || []),
                        { id: uid(), text: "", done: false },
                      ],
                    }
                  : o,
              ),
            },
          }));
        }
        function patchSubtask(section, objId, stId, k, v) {
          update((s) => ({
            ...s,
            objectives: {
              ...s.objectives,
              [section]: (s.objectives?.[section] || []).map((o) =>
                o.id === objId
                  ? {
                      ...o,
                      subtasks: (o.subtasks || []).map((st) =>
                        st.id === stId ? { ...st, [k]: v } : st,
                      ),
                    }
                  : o,
              ),
            },
          }));
        }
        function rmSubtask(section, objId, stId) {
          update((s) => ({
            ...s,
            objectives: {
              ...s.objectives,
              [section]: (s.objectives?.[section] || []).map((o) =>
                o.id === objId
                  ? {
                      ...o,
                      subtasks: (o.subtasks || []).filter(
                        (st) => st.id !== stId,
                      ),
                    }
                  : o,
              ),
            },
          }));
        }

        return (
          <div className="obj-cols">
            {SECTIONS.map((sec) => (
              <div key={sec}>
                <div className="obj-section-hdr">{LABELS[sec]}</div>
                {(state.objectives?.[sec] || []).map((obj) => {
                  const stClass =
                    obj.status === "complete"
                      ? "complete"
                      : obj.status === "failed"
                        ? "failed"
                        : "";
                  return (
                    <div
                      key={obj.id}
                      className={`obj-card${stClass ? " " + stClass : ""}`}
                    >
                      <div className="obj-header">
                        <button
                          className={`status-badge st-${obj.status || "active"}`}
                          onClick={() => cycleStatus(sec, obj.id)}
                        >
                          {(obj.status || "active").toUpperCase()}
                        </button>
                        <input
                          className="obj-title-in"
                          value={obj.title}
                          onChange={(e) =>
                            patchObj(sec, obj.id, "title", e.target.value)
                          }
                          placeholder="Objective title..."
                        />
                        <button
                          className="btn btn-danger btn-xs"
                          onClick={() => rmObj(sec, obj.id)}
                        >
                          ✕
                        </button>
                      </div>
                      <textarea
                        className="obj-desc-ta"
                        placeholder="Description..."
                        value={obj.description || ""}
                        onChange={(e) =>
                          patchObj(sec, obj.id, "description", e.target.value)
                        }
                      />
                      <ul className="subtask-list">
                        {(obj.subtasks || []).map((st) => (
                          <li key={st.id} className="subtask-item">
                            <input
                              type="checkbox"
                              className="subtask-cb"
                              checked={!!st.done}
                              onChange={(e) =>
                                patchSubtask(
                                  sec,
                                  obj.id,
                                  st.id,
                                  "done",
                                  e.target.checked,
                                )
                              }
                            />
                            <input
                              className="subtask-text-in"
                              value={st.text}
                              onChange={(e) =>
                                patchSubtask(
                                  sec,
                                  obj.id,
                                  st.id,
                                  "text",
                                  e.target.value,
                                )
                              }
                              placeholder="Subtask..."
                            />
                            <button
                              className="btn btn-danger btn-xs"
                              onClick={() => rmSubtask(sec, obj.id, st.id)}
                            >
                              ✕
                            </button>
                          </li>
                        ))}
                      </ul>
                      <div className="row gap-sm" style={{ marginTop: 4 }}>
                        <button
                          className="btn btn-muted btn-xs"
                          onClick={() => addSubtask(sec, obj.id)}
                        >
                          + Subtask
                        </button>
                      </div>
                      <div className="reward-row">
                        <span className="reward-lbl">Reward:</span>
                        <input
                          className="reward-in"
                          placeholder="—"
                          value={obj.reward || ""}
                          onChange={(e) =>
                            patchObj(sec, obj.id, "reward", e.target.value)
                          }
                        />
                      </div>
                    </div>
                  );
                })}
                <button
                  className="btn btn-gold btn-xs"
                  onClick={() => addObj(sec)}
                  style={{ width: "100%", marginTop: 4 }}
                >
                  + Objective
                </button>
              </div>
            ))}
          </div>
        );
      }

      // ─── COMBAT MODE TAB ─────────────────────────────────────────────────────────
      function CombatModeTab({ state, update, tracker }) {
        function setHpDirect(bpId, delta) {
          update((s) => ({
            ...s,
            bodyParts: s.bodyParts.map((b) => {
              if (b.id !== bpId) return b;
              return {
                ...b,
                currentHp: Math.max(0, Math.min(b.maxHp, b.currentHp + delta)),
              };
            }),
          }));
        }

        return (
          <>
            <TrackerBar tracker={tracker} />
            <div className="panel">
              <div className="panel-title">Quick Combat — Body Status</div>
              <div className="combat-grid">
                {state.bodyParts.map((bp) => {
                  const cls = dmgClass(bp.currentHp, bp.maxHp);
                  return (
                    <div
                      key={bp.id}
                      className={`combat-bp${cls ? " " + cls : ""}`}
                    >
                      <div className="combat-bp-name">
                        {bp.name}
                        {bp.lethal ? " ☠" : ""}
                      </div>
                      <div className="combat-hp-row">
                        <div className="combat-adj-btns">
                          <button
                            className="btn btn-danger btn-icon btn-sm"
                            onClick={() => setHpDirect(bp.id, -1)}
                          >
                            −
                          </button>
                          <button
                            className="btn btn-success btn-icon btn-sm"
                            onClick={() => setHpDirect(bp.id, 1)}
                          >
                            +
                          </button>
                        </div>
                        <div className="combat-hp-big">{bp.currentHp}</div>
                        <div className="combat-hp-sep">/</div>
                        <div className="combat-hp-max">{bp.maxHp}</div>
                      </div>
                      {(bp.conditions || []).length > 0 && (
                        <div className="cond-list">
                          {bp.conditions.map((c) => (
                            <span
                              key={c.id}
                              className={`cond-badge cond-t${c.tier}`}
                            >
                              {c.text}
                            </span>
                          ))}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          </>
        );
      }

      // ─── NOTES TAB ───────────────────────────────────────────────────────────────
      function NotesTab({ state, update }) {
        return (
          <div className="panel" style={{ flex: 1 }}>
            <div className="panel-title">Notes & Logs</div>
            <div className="field-group" style={{ marginBottom: 14 }}>
              <label className="field-label">Character Notes</label>
              <textarea
                className="notes-ta"
                value={state.notes || ""}
                onChange={(e) =>
                  update((s) => ({ ...s, notes: e.target.value }))
                }
                placeholder="Write anything here..."
              />
            </div>
            <div className="field-group">
              <label className="field-label">Condition Log</label>
              <textarea
                className="notes-ta"
                style={{ minHeight: 200 }}
                value={state.conditionLog || ""}
                onChange={(e) =>
                  update((s) => ({ ...s, conditionLog: e.target.value }))
                }
                placeholder="Track conditions, damage events, story notes..."
              />
            </div>
          </div>
        );
      }

      // ─── APP ─────────────────────────────────────────────────────────────────────
      function App() {
        const [auth, setAuth] = useState(() => {
          const token = localStorage.getItem("token");
          const userId = localStorage.getItem("userId");
          const username = localStorage.getItem("username");
          return token ? { token, userId, username } : null;
        });
        const [charState, setCharState] = useState(DEFAULT_STATE);
        const [tracker, setTracker] = useState(null);
        const [activeTab, setActiveTab] = useState("body");
        const [saveStatus, setSaveStatus] = useState("saved");
        const [toast, showToast] = useToast();
        const saveTimer = useRef(null);
        const isLoaded = useRef(false);

        useEffect(() => {
          if (!auth) return;
          // Load character
          apiFetch("/api/character", {}, auth.token)
            .then((d) => {
              if (d.state) {
                // Merge to ensure all fields exist
                const merged = {
                  ...DEFAULT_STATE,
                  ...d.state,
                  identity: {
                    ...DEFAULT_STATE.identity,
                    ...(d.state.identity || {}),
                  },
                  traits: {
                    ...DEFAULT_STATE.traits,
                    ...(d.state.traits || {}),
                  },
                  traitBonus: {
                    ...DEFAULT_STATE.traitBonus,
                    ...(d.state.traitBonus || {}),
                  },
                  traitLevelBonus: {
                    ...DEFAULT_STATE.traitLevelBonus,
                    ...(d.state.traitLevelBonus || {}),
                  },
                  bonusPoints: {
                    ...DEFAULT_STATE.bonusPoints,
                    ...(d.state.bonusPoints || {}),
                  },
                  levelPoints: {
                    ...DEFAULT_STATE.levelPoints,
                    ...(d.state.levelPoints || {}),
                  },
                  tokens: {
                    ...DEFAULT_STATE.tokens,
                    ...(d.state.tokens || {}),
                  },
                  exposure: {
                    ...DEFAULT_STATE.exposure,
                    ...(d.state.exposure || {}),
                  },
                };
                setCharState(merged);
              }
              isLoaded.current = true;
            })
            .catch(() => {
              isLoaded.current = true;
            });
          // Poll tracker
          const pollTracker = () => {
            apiFetch("/api/tracker", {}, auth.token).then((d) => {
              if (!d.error) setTracker(d);
            });
          };
          pollTracker();
          const iv = setInterval(pollTracker, 12000);
          return () => clearInterval(iv);
        }, [auth]);

        function update(updater) {
          setCharState((prev) => {
            const next =
              typeof updater === "function" ? updater(prev) : updater;
            if (!isLoaded.current) return next;
            setSaveStatus("saving");
            clearTimeout(saveTimer.current);
            saveTimer.current = setTimeout(() => {
              apiFetch(
                "/api/character",
                { method: "POST", body: JSON.stringify({ state: next }) },
                auth?.token,
              )
                .then(() => setSaveStatus("saved"))
                .catch(() => setSaveStatus("saved"));
            }, 1500);
            return next;
          });
        }

        function logout() {
          localStorage.removeItem("token");
          localStorage.removeItem("userId");
          localStorage.removeItem("username");
          setAuth(null);
          setCharState(DEFAULT_STATE);
          isLoaded.current = false;
        }

        if (!auth) return <LoginOverlay onLogin={setAuth} />;

        return (
          <div
            style={{
              display: "flex",
              flexDirection: "column",
              height: "100vh",
              overflow: "hidden",
            }}
          >
            {/* Top Bar */}
            <div className="topbar">
              <div className="topbar-live">
                <div className="live-dot" />
                LIVE
              </div>
              <div className="topbar-title">GALACTIC PRIME TIME</div>
              <div className="topbar-right">
                <span className={`save-pill ${saveStatus}`}>
                  {saveStatus === "saving" ? "SAVING…" : "SAVED"}
                </span>
                <span style={{ letterSpacing: 1 }}>
                  {auth.username?.toUpperCase()}
                </span>
                <button className="btn btn-danger btn-sm" onClick={logout}>
                  Logout
                </button>
              </div>
            </div>

            {/* Tab Nav */}
            <div className="tab-nav">
              {TABS.map((t) => (
                <button
                  key={t.id}
                  className={`tab-btn${activeTab === t.id ? " active" : ""}`}
                  onClick={() => setActiveTab(t.id)}
                >
                  {t.label}
                </button>
              ))}
            </div>

            {/* Tab Content */}
            <div className="tab-content">
              {activeTab === "body" && (
                <BodyTab
                  state={charState}
                  update={update}
                  showToast={showToast}
                />
              )}
              {activeTab === "skills" && (
                <SkillsTab
                  state={charState}
                  update={update}
                  token={auth.token}
                />
              )}
              {activeTab === "achievements" && (
                <AchievementsTab state={charState} update={update} />
              )}
              {activeTab === "inventory" && (
                <InventoryTab state={charState} update={update} />
              )}
              {activeTab === "exposure" && (
                <ExposureTab state={charState} update={update} />
              )}
              {activeTab === "objectives" && (
                <ObjectivesTab state={charState} update={update} />
              )}
              {activeTab === "combat" && (
                <CombatModeTab
                  state={charState}
                  update={update}
                  tracker={tracker}
                />
              )}
              {activeTab === "notes" && (
                <NotesTab state={charState} update={update} />
              )}
            </div>

            <Toast toast={toast} />
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
