        color: var(--success);
        font-size: 10px;
        letter-spacing: 2px;
        text-transform: uppercase;
        padding: 8px 16px;
        z-index: 9999;
        opacity: 0;
        transform: translateY(8px);
        transition:
          opacity 0.3s,
          transform 0.3s;
        pointer-events: none;
      }
      .toast.err {
        border-color: var(--danger);
        color: var(--danger);
      }
      .toast.show {
        opacity: 1;
        transform: translateY(0);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState, useEffect, useRef, useCallback } = React;
      const API = "http://192.168.7.62:3001"; // replace with actual API endpoint

      const TABS = [
        { id: "body", label: "Body" },
        { id: "skills", label: "Skills" },
        { id: "achievements", label: "Achievements" },
        { id: "inventory", label: "Inventory" },
        { id: "exposure", label: "Exposure" },
        { id: "objectives", label: "Objectives" },
        { id: "combat", label: "Combat Mode" },
        { id: "notes", label: "Notes" },
      ];
      const BODY_TRAITS = ["physique", "reflexes"];
      const CORE_TRAITS = ["mind", "charm"];
      const ALL_TRAITS = ["physique", "reflexes", "mind", "charm"];
      const TRAIT_LABELS = {
        physique: "Physique",
        reflexes: "Reflexes",
        mind: "Mind",
        charm: "Charm",
      };
      const RACES = [
        "Human",
        "Cyborg",
        "Android",
        "Mutant",
        "Alien",
        "Clone",
        "Hybrid",
        "Synthetic",
      ];
      const ATK_TYPES = [
        "Single Target",
        "Line",
        "Arc",
        "Cone",
        "Burst",
        "Self",
        "Thrown",
        "All",
      ];
      const DMG_TYPES = ["Crush", "Bleed", "Burn", "Shock", "Toxic", "Psy"];
      const BOSS_TIERS = [
        "bronze",
        "silver",
        "gold",
        "legendary",
        "mythic",
        "godly",
      ];
      const CAT_ICONS = {
        Weapons: "⚔️",
        Equipment: "🛡️",
        Tools: "🔧",
        Consumables: "💊",
        Misc: "📦",
        Hotbar: "⚡",
        Equipped: "🏃",
        default: "📦",
      };

      const DEFAULT_STATE = {
        identity: {
          name: "",
          player: "",
          race: "Human",
          level: 1,
          background: "",
          portrait: "",
          contestantNumber: "",
        },
        traits: { physique: 1, reflexes: 1, mind: 1, charm: 1 },
        traitBonus: { physique: 0, reflexes: 0, mind: 0, charm: 0 },
        traitLevelBonus: { physique: 0, reflexes: 0, mind: 0, charm: 0 },
        bonusPoints: { body: 5, core: 5 },
        levelPoints: { body: 0, core: 0 },
        hpUpgradePointsSpent: 0,
        bodyParts: [
          {
            id: 1,
            name: "Head",
            maxHp: 3,
            currentHp: 3,
            lethal: false,
            conditions: [],
          },
          {
            id: 2,
            name: "Torso",
            maxHp: 5,
            currentHp: 5,
            lethal: false,
            conditions: [],
          },
          {
            id: 3,
            name: "Left Arm",
            maxHp: 3,
            currentHp: 3,
            lethal: false,
            conditions: [],
          },
          {
            id: 4,
            name: "Right Arm",
            maxHp: 3,
            currentHp: 3,
            lethal: false,
            conditions: [],
          },
          {
            id: 5,
            name: "Left Leg",
            maxHp: 4,
            currentHp: 4,
            lethal: false,
            conditions: [],
          },
          {
            id: 6,
            name: "Right Leg",
            maxHp: 4,
            currentHp: 4,
            lethal: false,
            conditions: [],
          },
        ],
        skills: [],
        tags: [],
        effects: [],
        exposure: { viewers: 0, followers: 0 },
        patrons: [
          { rank: 1, name: "", amount: "", notes: "", avatar: "" },
          { rank: 2, name: "", amount: "", notes: "", avatar: "" },
          { rank: 3, name: "", amount: "", notes: "", avatar: "" },
        ],
        tokens: { narrative: 0, upgrade: 0, patronTokens: 0, bossTokens: [] },
        inventory: {
          categories: [
            { id: 1, name: "Equipped", locked: true, items: [], order: 0 },
            {
              id: 2,
              name: "Hotbar",
              locked: true,
              maxItems: 6,
              items: [],
              order: 1,
            },
            { id: 10, name: "Equipment", locked: false, items: [], order: 2 },
            { id: 11, name: "Weapons", locked: false, items: [], order: 3 },
            { id: 12, name: "Tools", locked: false, items: [], order: 4 },
            { id: 13, name: "Consumables", locked: false, items: [], order: 5 },
            { id: 14, name: "Misc", locked: false, items: [], order: 6 },
          ],
        },
        objectives: { main: [], directives: [], goals: [] },
        achievements: [],
        notes: "",
        conditionLog: "",
      };

      function uid() {
        return Date.now() + Math.floor(Math.random() * 100000);
      }
      function dmgClass(current, max) {
        if (max <= 0) return "";
        const pct = current / max;
        if (pct <= 0) return "destroyed";
        if (pct <= 0.25) return "critical";
        if (pct <= 0.5) return "heavy";
        if (pct <= 0.75) return "medium";
        if (pct < 1) return "light";
        return "";
      }
      function catIcon(name) {
        return CAT_ICONS[name] || CAT_ICONS.default;
      }
      function itemDmgLabel(item) {
        if (!item) return "";
        if (item.damage) {
          const parts = [item.damage];
          if (item.damageType && item.damageType.length)
            parts.push(item.damageType.join("/"));
          return parts.join(" ");
        }
        if (item.resistance) return `🛡 ${item.resistance}`;
        return "";
      }

      function apiFetch(path, opts = {}, token) {
        const headers = {
          "Content-Type": "application/json",
          ...(token ? { Authorization: `Bearer ${token}` } : {}),
          ...opts.headers,
        };
        return fetch(API + path, { ...opts, headers }).then((r) => r.json());
      }

      function useToast() {
        const [toast, setToast] = useState({
          msg: "",
          type: "ok",
          show: false,
        });
        const show = useCallback((msg, type = "ok") => {
          setToast({ msg, type, show: true });
          setTimeout(() => setToast((t) => ({ ...t, show: false })), 2500);
        }, []);
        return [toast, show];
      }

      function Toast({ toast }) {
        return (
          <div
            className={`toast${toast.type === "err" ? " err" : ""}${toast.show ? " show" : ""}`}
          >
            {toast.msg}
          </div>
        );
      }

      // ─── LOGIN ───────────────────────────────────────────────────────────────────
      function LoginOverlay({ onLogin }) {
        const [isRegister, setIsRegister] = useState(false);
        const [username, setUsername] = useState("");
        const [password, setPassword] = useState("");
        const [err, setErr] = useState("");
        const [loading, setLoading] = useState(false);

        async function submit(e) {
          e.preventDefault();
          setErr("");
          setLoading(true);
          try {
            const path = isRegister ? "/api/auth/register" : "/api/auth/login";
            const data = await apiFetch(path, {
              method: "POST",
              body: JSON.stringify({ username, password }),
            });
            if (data.error) {
              setErr(data.error);
              setLoading(false);
              return;
            }
            localStorage.setItem("token", data.token);
            localStorage.setItem("userId", data.userId);
            localStorage.setItem("username", data.username);
            onLogin({
              token: data.token,
              userId: data.userId,
              username: data.username,
            });
          } catch {
            setErr("Connection error. Is the server running?");
          }
          setLoading(false);
        }

        return (
          <div className="login-overlay">
            <div className="login-box">
              <div className="login-title">
                ⚡ {isRegister ? "Register Contestant" : "Contestant Login"}
              </div>
              <form onSubmit={submit}>
                <div
                  className="add-form"
                  style={{
                    border: "none",
                    background: "transparent",
                    padding: 0,
                    flexDirection: "column",
                    gap: 10,
                  }}
                >
                  <div className="field-group">
                    <label className="field-label">Username</label>
                    <input
                      className="fi"
                      value={username}
                      onChange={(e) => setUsername(e.target.value)}
                      required
                      autoFocus
                    />
                  </div>
                  <div className="field-group">
                    <label className="field-label">Password</label>
                    <input
                      className="fi"
                      type="password"
                      value={password}
                      onChange={(e) => setPassword(e.target.value)}
                      required
                    />
                  </div>
                </div>
                <button
                  className="btn btn-cyan"
                  type="submit"
                  disabled={loading}
                  style={{ width: "100%", marginTop: 14, padding: "9px" }}
                >
                  {loading
                    ? "Connecting..."
                    : isRegister
                      ? "Register"
                      : "Enter the Arena"}
                </button>
              </form>
              {err && <div className="login-err">{err}</div>}
              <div
                className="login-toggle"
                onClick={() => setIsRegister((r) => !r)}
              >
                {isRegister
                  ? "Have an account? Login"
                  : "New contestant? Register"}
              </div>
            </div>
          </div>
        );
      }

      // ─── TRACKER BAR ─────────────────────────────────────────────────────────────
      function TrackerBar({ tracker }) {
        if (!tracker)
          return (
            <div className="tracker-bar">
              <span className="trk-empty">MOMENT TRACKER — NO DATA</span>
            </div>
          );
        const slots = {};
        (tracker.entries || []).forEach((e) => {
          if (!slots[e.slot]) slots[e.slot] = [];
          slots[e.slot].push(e);
        });
        const slotNums = Array.from(
          { length: tracker.totalSlots || 10 },
          (_, i) => i + 1,
        );
        return (
          <div className="tracker-bar">
            <div className="trk-pill clock">
              <span className="trk-pill-label">Clock</span>
              <span className="trk-pill-val">{tracker.clock || "00:00"}</span>
            </div>
            <div className="trk-pill moment">
              <span className="trk-pill-label">Moment</span>
              <span className="trk-pill-val">{tracker.moment ?? "—"}</span>
            </div>
            <div className="trk-divider" />
            <div className="trk-rail">
              {slotNums.map((n) => {
                const isCur = n === tracker.moment;
                return (
                  <div key={n} className={`trk-slot${isCur ? " cur" : ""}`}>
                    <span className="trk-slot-num">{n}</span>
                    {(slots[n] || []).map((e) => (
                      <div
                        key={e.id}
                        className="trk-chip"
                        style={{
                          borderColor: e.color || "#3a4560",
                          color: e.color || "#3a4560",
                          background: `${e.color || "#3a4560"}18`,
                        }}
                      >
                        {e.label}
                      </div>
                    ))}
                  </div>
                );
              })}
            </div>
          </div>
        );
      }

      // ─── BODY TAB ────────────────────────────────────────────────────────────────
      function BodyTab({ state, update, showToast }) {
        const portraitRef = useRef();
        const id = state.identity;

        function patchId(k, v) {
          update((s) => ({ ...s, identity: { ...s.identity, [k]: v } }));
        }
        function patchBP(bpId, k, v) {
          update((s) => ({
            ...s,
            bodyParts: s.bodyParts.map((b) =>
              b.id === bpId ? { ...b, [k]: v } : b,
            ),
          }));
        }
        function setHp(bpId, box, damaged) {
          update((s) => ({
            ...s,
            bodyParts: s.bodyParts.map((b) => {
              if (b.id !== bpId) return b;
              const boxes = Array.from(
                { length: b.maxHp },
                (_, i) => i < b.maxHp - b.currentHp,
              );
              boxes[box] = damaged;
              const currentHp = b.maxHp - boxes.filter(Boolean).length;
              return { ...b, currentHp };
            }),
          }));
        }
        function addCondition(bpId, text, tier) {
          if (!text.trim()) return;
          update((s) => ({
            ...s,
            bodyParts: s.bodyParts.map((b) =>
              b.id === bpId
                ? {
                    ...b,
                    conditions: [
                      ...(b.conditions || []),
                      { id: uid(), text, tier: +tier },
                    ],
                  }
                : b,
            ),
          }));
        }
        function rmCondition(bpId, cId) {
          update((s) => ({
            ...s,
            bodyParts: s.bodyParts.map((b) =>
              b.id === bpId
                ? { ...b, conditions: b.conditions.filter((c) => c.id !== cId) }
                : b,
            ),
          }));
        }
        function addBodyPart() {
          update((s) => ({
            ...s,
            bodyParts: [
              ...s.bodyParts,
              {
                id: uid(),
                name: "New Part",
                maxHp: 3,
                currentHp: 3,
                lethal: false,
                conditions: [],
              },
            ],
          }));
        }
        function rmBodyPart(id) {
          update((s) => ({
            ...s,
            bodyParts: s.bodyParts.filter((b) => b.id !== id),
          }));
        }

        function traitTotal(t) {
          return (
            (state.traits[t] || 0) +
            (state.traitBonus[t] || 0) +
            (state.traitLevelBonus[t] || 0)
          );
        }
        function isBodyTrait(t) {
          return BODY_TRAITS.includes(t);
        }
        function traitPool(t) {
          return isBodyTrait(t) ? "body" : "core";
        }

        function adjustBonus(t, delta) {
          const pool = traitPool(t);
          const available = state.bonusPoints[pool] || 0;
          const current = state.traitBonus[t] || 0;
          if (delta > 0 && available <= 0) return;
          if (delta < 0 && current <= 0) return;
          update((s) => ({
            ...s,
            traitBonus: {
              ...s.traitBonus,
              [t]: (s.traitBonus[t] || 0) + delta,
            },
            bonusPoints: {
              ...s.bonusPoints,
              [pool]: (s.bonusPoints[pool] || 0) - delta,
            },
          }));
        }
        function investLevel(t) {
          const pool = traitPool(t);
          if ((state.levelPoints[pool] || 0) <= 0) return;
          update((s) => ({
            ...s,
            traitLevelBonus: {
              ...s.traitLevelBonus,
              [t]: (s.traitLevelBonus[t] || 0) + 1,
            },
            levelPoints: {
              ...s.levelPoints,
              [pool]: (s.levelPoints[pool] || 0) - 1,
            },
          }));
        }

        function addEffect() {
          const text = prompt("New effect:");
          if (!text) return;
          update((s) => ({
            ...s,
            effects: [...(s.effects || []), { id: uid(), text }],
          }));
        }
        function rmEffect(id) {
          update((s) => ({
            ...s,
            effects: s.effects.filter((e) => e.id !== id),
          }));
        }

        const [condForms, setCondForms] = useState({});
        function toggleCondForm(id) {
          setCondForms((f) => ({ ...f, [id]: !f[id] }));
        }

        const bodyPts = state.bonusPoints?.body ?? 0;
        const corePts = state.bonusPoints?.core ?? 0;
        const lvlBody = state.levelPoints?.body ?? 0;
        const lvlCore = state.levelPoints?.core ?? 0;

        return (
          <>
            {/* Identity */}
            <div className="panel">
              <div className="panel-title">Contestant Identity</div>
              <div className="identity-row">
                <div>
                  <div
                    className="portrait-box"
                    onClick={() => portraitRef.current.click()}
                  >
                    {id.portrait ? (
                      <img src={id.portrait} alt="portrait" />
                    ) : (
                      "👤"
                    )}
                  </div>
                  <input
                    ref={portraitRef}
                    type="file"
                    accept="image/*"
                    style={{ display: "none" }}
                    onChange={(e) => {
                      const f = e.target.files[0];
                      if (!f) return;
                      const rd = new FileReader();
                      rd.onload = (ev) => patchId("portrait", ev.target.result);
                      rd.readAsDataURL(f);
                    }}
                  />
                </div>
                <div className="identity-fields">
                  <div className="field-group">
                    <label className="field-label">Character Name</label>
                    <input
                      className="fi"
                      value={id.name}
                      onChange={(e) => patchId("name", e.target.value)}
                    />
                  </div>
                  <div className="field-group">
                    <label className="field-label">Player Name</label>
                    <input
                      className="fi"
                      value={id.player}
                      onChange={(e) => patchId("player", e.target.value)}
                    />
                  </div>
                  <div className="field-group">
                    <label className="field-label">Race</label>
                    <select
                      className="fi"
                      value={id.race}
                      onChange={(e) => patchId("race", e.target.value)}
                    >
                      {RACES.map((r) => (
                        <option key={r}>{r}</option>
                      ))}
                    </select>
                  </div>
                  <div className="field-group">
                    <label className="field-label">Level</label>
                    <input
                      className="fi"
                      type="number"
                      min="1"
                      value={id.level}
                      onChange={(e) => patchId("level", +e.target.value)}
                    />
                  </div>
                  <div className="field-group" style={{ gridColumn: "1 / -1" }}>
                    <label className="field-label">Background</label>
                    <input
                      className="fi"
                      value={id.background}
                      onChange={(e) => patchId("background", e.target.value)}
                    />
                  </div>
                  <div className="field-group">
                    <label className="field-label">Contestant #</label>
                    <input
                      className="fi"
                      value={id.contestantNumber}
                      onChange={(e) =>
                        patchId("contestantNumber", e.target.value)
                      }
                    />
                  </div>
                </div>
              </div>
            </div>

            {/* Traits */}
            <div className="panel">
              <div className="panel-title">
                Traits
                <div className="row gap-sm" style={{ fontWeight: "normal" }}>
                  <span
                    className={`pts-badge${bodyPts === 0 ? " empty" : bodyPts <= 2 ? " warn" : ""}`}
                  >
                    BODY {bodyPts} pts
                  </span>
                  <span
                    className={`pts-badge${corePts === 0 ? " empty" : corePts <= 2 ? " warn" : ""}`}
                  >
                    CORE {corePts} pts
                  </span>
                  {lvlBody > 0 && (
                    <span className="pts-badge warn">LVL-BODY {lvlBody}</span>
                  )}
                  {lvlCore > 0 && (
                    <span className="pts-badge warn">LVL-CORE {lvlCore}</span>
                  )}
                </div>
              </div>
              <div className="traits-grid">
                {ALL_TRAITS.map((t) => {
                  const total = traitTotal(t);
                  const bonus = state.traitBonus[t] || 0;
                  const lbonus = state.traitLevelBonus[t] || 0;
                  const pool = traitPool(t);
                  const poolAv = state.bonusPoints[pool] || 0;
                  const lvlAv = state.levelPoints[pool] || 0;
                  return (
                    <div key={t} className="trait-card">
                      <div className="trait-name">{TRAIT_LABELS[t]}</div>
                      <div className="trait-sub">
                        {isBodyTrait(t) ? "Body" : "Core"}
                      </div>
                      <div className="trait-val">{total}</div>
                      <div className="trait-controls">
                        <button
                          className="btn btn-danger btn-icon btn-sm"
                          onClick={() => adjustBonus(t, -1)}
                          disabled={bonus <= 0}
                        >
                          −
                        </button>
                        <span className="trait-bonus-display">
                          Base {state.traits[t] || 0}
                          {bonus > 0 ? ` +${bonus}` : ""}
                          {lbonus > 0 ? ` +${lbonus}Lv` : ""}
                        </span>
                        <button
                          className="btn btn-cyan btn-icon btn-sm"
                          onClick={() => adjustBonus(t, 1)}
                          disabled={poolAv <= 0}
                        >
                          +
                        </button>
                      </div>
                      {lvlAv > 0 && (
                        <div className="trait-sp">
                          <button
                            className="btn btn-gold btn-xs"
                            onClick={() => investLevel(t)}
                          >
                            Invest LVL Pt
                          </button>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>

            {/* Body Parts */}
            <div className="panel">
              <div className="panel-title">
                Body Parts{" "}
                <button className="btn btn-cyan btn-sm" onClick={addBodyPart}>
                  + Part
                </button>
              </div>
              <div className="body-parts-grid">
                {state.bodyParts.map((bp) => {
                  const cls = dmgClass(bp.currentHp, bp.maxHp);
                  const boxes = Array.from(
                    { length: bp.maxHp },
                    (_, i) => i >= bp.currentHp,
                  );
                  return (
                    <div
                      key={bp.id}
                      className={`bp-card${cls ? " " + cls : ""}`}
                    >
                      <div className="bp-header">
                        <input
                          className="bp-name-input"
                          value={bp.name}
                          onChange={(e) =>
                            patchBP(bp.id, "name", e.target.value)
                          }
                        />
                        <label className="lethal-toggle">
                          <input
                            type="checkbox"
                            checked={!!bp.lethal}
                            onChange={(e) =>
                              patchBP(bp.id, "lethal", e.target.checked)
                            }
                          />
                          LETHAL
                        </label>
                        <button
                          className="btn btn-danger btn-xs"
                          onClick={() => rmBodyPart(bp.id)}
                        >
                          ✕
                        </button>
                      </div>
                      <div className="hp-row">
                        <span className="hp-label">HP</span>
                        <input
                          className="hp-max-input"
                          type="number"
                          min="0"
                          value={bp.maxHp}
                          onChange={(e) =>
                            patchBP(
                              bp.id,
                              "maxHp",
                              Math.max(0, +e.target.value),
                            )
                          }
                        />
                        <div className="hp-boxes">
                          {boxes.map((isDmg, i) => (
                            <div
                              key={i}
                              className={`hp-box${isDmg ? " dmg" : ""}`}
                              onClick={() => {
                                const newBoxes = [...boxes];
                                newBoxes[i] = !newBoxes[i];
                                const currentHp =
                                  bp.maxHp - newBoxes.filter(Boolean).length;
                                patchBP(bp.id, "currentHp", currentHp);
                              }}
                            />
                          ))}
                        </div>
                      </div>
                      <div className="cond-list">
                        {(bp.conditions || []).map((c) => (
                          <span
                            key={c.id}
                            className={`cond-badge cond-t${c.tier}`}
                          >
                            {c.text}
                            <button
                              className="cond-remove"
                              onClick={() => rmCondition(bp.id, c.id)}
                            >
                              ✕
                            </button>
                          </span>
                        ))}
                      </div>
                      {condForms[bp.id] ? (
                        <CondAddForm
                          bpId={bp.id}
                          onAdd={(txt, tier) => {
                            addCondition(bp.id, txt, tier);
                            toggleCondForm(bp.id);
                          }}
                          onCancel={() => toggleCondForm(bp.id)}
                        />
                      ) : (
                        <button
                          className="btn btn-muted btn-xs"
                          onClick={() => toggleCondForm(bp.id)}
                        >
                          + Condition
                        </button>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>

            {/* Active Effects */}
            <div className="panel">
              <div className="panel-title">
                Active Effects{" "}
                <button className="btn btn-cyan btn-sm" onClick={addEffect}>
                  +
                </button>
              </div>
              <div className="row" style={{ flexWrap: "wrap", gap: 6 }}>
                {(state.effects || []).map((e) => (
                  <span key={e.id} className="effect-chip">
                    {e.text}
                    <button className="chip-rm" onClick={() => rmEffect(e.id)}>
                      ✕
                    </button>
                  </span>
                ))}
                {(!state.effects || state.effects.length === 0) && (
                  <span style={{ color: "var(--muted)", fontSize: 11 }}>
                    No active effects
                  </span>
                )}
              </div>
            </div>
          </>
        );
      }

      function CondAddForm({ bpId, onAdd, onCancel }) {
        const [text, setText] = useState("");
        const [tier, setTier] = useState("1");
        return (
          <div className="cond-add-form">
            <input
              className="fi"
              style={{ flex: 1, fontSize: 11, padding: "3px 6px" }}
              placeholder="Condition name"
              value={text}
              onChange={(e) => setText(e.target.value)}
              autoFocus
            />
            <select
              className="mini-select"
              value={tier}
              onChange={(e) => setTier(e.target.value)}
            >
              <option value="1">T1</option>
              <option value="2">T2</option>
              <option value="3">T3</option>
            </select>
            <button
              className="btn btn-success btn-xs"
              onClick={() => onAdd(text, tier)}
            >
              Add
            </button>
            <button className="btn btn-muted btn-xs" onClick={onCancel}>
              ✕
            </button>
          </div>
        );
      }

      // ─── SKILLS TAB ──────────────────────────────────────────────────────────────
      function SkillsTab({ state, update, token }) {
        const [lib, setLib] = useState([]);
        const [search, setSearch] = useState("");
        const [showLib, setShowLib] = useState(false);
        const [expanded, setExpanded] = useState({});

        useEffect(() => {
          apiFetch("/api/character/skills", {}, token).then((d) => {
            if (Array.isArray(d)) setLib(d);
          });
        }, [token]);

        function toggleExpand(id) {
          setExpanded((e) => ({ ...e, [id]: !e[id] }));
        }

        function addSkillFromLib(tpl) {
          const sk = {
            id: uid(),
            name: tpl.name,
            level: 1,
            capacity: tpl.capacity || "Active",
            momentCost: tpl.momentCost || "",
            stats: tpl.stats || [],
            passive: false,
            range: tpl.range || "",
            target: tpl.target || "",
            requirements: tpl.requirements || "",
            effect: tpl.effect || "",
            description: tpl.description || "",
            unlockedByAchievement: "",
            levelEffects: tpl.levelEffects || {},
          };
          update((s) => ({ ...s, skills: [...s.skills, sk] }));
          setShowLib(false);
        }

        function addBlankSkill() {
          const name = prompt("Skill name:");
          if (!name) return;
          update((s) => ({
            ...s,
            skills: [
              ...s.skills,
              {
                id: uid(),
                name,
                level: 1,
                capacity: "Active",
                momentCost: "",
                stats: [],
                passive: false,
                range: "",
                target: "",
                requirements: "",
                effect: "",
                description: "",
                unlockedByAchievement: "",
                levelEffects: {},
              },
            ],
          }));
        }

        function rmSkill(id) {
          update((s) => ({
            ...s,
            skills: s.skills.filter((sk) => sk.id !== id),
          }));
        }
        function patchSkill(id, k, v) {
          update((s) => ({
            ...s,
            skills: s.skills.map((sk) =>
              sk.id === id ? { ...sk, [k]: v } : sk,
            ),
          }));
        }
        function setLevel(id, lv) {
          update((s) => ({
            ...s,
            skills: s.skills.map((sk) =>
              sk.id === id ? { ...sk, level: lv } : sk,
            ),
          }));
        }
        function toggleStat(id, stat) {
          update((s) => ({
            ...s,
            skills: s.skills.map((sk) => {
              if (sk.id !== id) return sk;
              const stats = sk.stats || [];
              return {
                ...sk,
                stats: stats.includes(stat)
                  ? stats.filter((x) => x !== stat)
                  : [...stats, stat],
              };
            }),
          }));
        }
        function patchLevelEffect(id, level, text) {
          update((s) => ({
            ...s,
            skills: s.skills.map((sk) =>
              sk.id === id
                ? {
                    ...sk,
                    levelEffects: { ...(sk.levelEffects || {}), [level]: text },
                  }
                : sk,
            ),
          }));
        }

        function traitTotal(t) {
          return (
            (state.traits[t] || 0) +
            (state.traitBonus[t] || 0) +
            (state.traitLevelBonus[t] || 0)
          );
        }
        function skillTotal(sk) {
          return (sk.stats || []).reduce((sum, s) => {
            const t = s.toLowerCase();
            return sum + (traitTotal(t) || 0);
          }, 0);
        }

        const filtered = lib.filter((t) =>
          t.name.toLowerCase().includes(search.toLowerCase()),
        );

        return (
          <>
            <div className="panel">
              <div className="panel-title">
                Skills ({state.skills.length})
                <div className="row gap-sm">
                  <button
                    className="btn btn-cyan btn-sm"
                    onClick={() => setShowLib((v) => !v)}
                  >
                    Library
                  </button>
                  <button
                    className="btn btn-muted btn-sm"
                    onClick={addBlankSkill}
                  >
                    + Manual
                  </button>
                </div>
              </div>
              {showLib && (
                <div
                  style={{
                    marginBottom: 12,
                    padding: 10,
                    background: "rgba(0,0,0,.3)",
                    borderRadius: 4,
                    border: "1px solid var(--border)",
                  }}
                >
                  <div className="panel-title" style={{ marginBottom: 8 }}>
                    Skill Library
                  </div>
                  <input
                    className="fi"
                    placeholder="Search skills..."
                    value={search}
                    onChange={(e) => setSearch(e.target.value)}
                    style={{ marginBottom: 8 }}
                  />
                  <div className="skill-lib-list">
                    {filtered.map((t) => (
                      <div
                        key={t._id}
                        className="lib-row"
                        onClick={() => addSkillFromLib(t)}
                      >
                        <span className="lib-row-name">{t.name}</span>
                        <span className="lib-row-meta">
                          {t.capacity || "Active"} · {t.momentCost || "—"}
                        </span>
                      </div>
                    ))}
                    {filtered.length === 0 && (
                      <span style={{ color: "var(--muted)", fontSize: 11 }}>
                        No matches
                      </span>
                    )}
                  </div>
                </div>
              )}
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {state.skills.map((sk) => {
                  const isExp = expanded[sk.id];
                  const total = skillTotal(sk);
                  return (
                    <div key={sk.id} className="skill-card">
                      <div className="skill-header">
                        <input
                          className="skill-name-in"
                          value={sk.name}
                          onChange={(e) =>
                            patchSkill(sk.id, "name", e.target.value)
                          }
                        />
                        <div className="pip-row">
                          {[1, 2, 3, 4, 5].map((n) => (
                            <div
                              key={n}
                              className={`pip${sk.level >= n ? " on" : ""}`}
                              onClick={() => setLevel(sk.id, n)}
                            />
                          ))}
                        </div>
                        <span className="skill-level-label">Lv {sk.level}</span>
                        <button
                          className="btn btn-muted btn-xs"
                          onClick={() => toggleExpand(sk.id)}
                        >
                          {isExp ? "▲" : "▼"}
                        </button>
                        <button
                          className="btn btn-danger btn-xs"
                          onClick={() => rmSkill(sk.id)}
                        >
                          ✕
                        </button>
                      </div>
                      <div className="skill-meta-row">
                        <span
                          className={`skill-badge${sk.passive ? " passive" : ""}`}
                          style={{ cursor: "pointer" }}
                          onClick={() =>
                            patchSkill(sk.id, "passive", !sk.passive)
                          }
                        >
                          {sk.passive ? "Passive" : "Active"}
                        </span>
                        {ALL_TRAITS.map((t) => (
                          <span
                            key={t}
                            className={`skill-badge stat${(sk.stats || []).includes(t) ? " on" : ""}`}
                            onClick={() => toggleStat(sk.id, t)}
                          >
                            {TRAIT_LABELS[t]}
                          </span>
                        ))}
                        {(sk.stats || []).length > 0 && (
                          <span className="skill-total">{total}</span>
                        )}
                      </div>
                      {isExp && (
                        <div className="skill-extra">
                          <div className="skill-extra-row">
                            <div className="field-group" style={{ flex: 1 }}>
                              <label className="field-label">Moment Cost</label>
                              <input
                                className="skill-fi"
                                style={{ width: 80 }}
                                value={sk.momentCost || ""}
                                onChange={(e) =>
                                  patchSkill(
                                    sk.id,
                                    "momentCost",
                                    e.target.value,
                                  )
                                }
                              />
                            </div>
                            <div className="field-group" style={{ flex: 1 }}>
                              <label className="field-label">Range</label>
                              <input
                                className="skill-fi"
                                style={{ width: 100 }}
                                value={sk.range || ""}
                                onChange={(e) =>
                                  patchSkill(sk.id, "range", e.target.value)
                                }
                              />
                            </div>
                            <div className="field-group" style={{ flex: 1 }}>
                              <label className="field-label">Target</label>
                              <input
                                className="skill-fi"
                                style={{ width: 100 }}
                                value={sk.target || ""}
                                onChange={(e) =>
                                  patchSkill(sk.id, "target", e.target.value)
                                }
                              />
                            </div>
                          </div>
                          <div className="field-group">
                            <label className="field-label">Requirements</label>
                            <input
                              className="skill-fi"
                              style={{ width: "100%" }}
                              value={sk.requirements || ""}
                              onChange={(e) =>
                                patchSkill(
                                  sk.id,
                                  "requirements",
                                  e.target.value,
                                )
                              }
                            />
                          </div>
                          <div className="field-group">
                            <label className="field-label">Effect</label>
                            <textarea
                              className="skill-fi"
                              style={{
                                width: "100%",
                                minHeight: 44,
                                resize: "vertical",
                              }}
                              value={sk.effect || ""}
                              onChange={(e) =>
                                patchSkill(sk.id, "effect", e.target.value)
                              }
                            />
                          </div>
                          <div className="field-group">
                            <label className="field-label">Description</label>
                            <textarea
                              className="skill-fi"
                              style={{
                                width: "100%",
                                minHeight: 44,
                                resize: "vertical",
                              }}
                              value={sk.description || ""}
                              onChange={(e) =>
                                patchSkill(sk.id, "description", e.target.value)
                              }
                            />
                          </div>
                          <div className="level-effects">
                            <div
                              className="field-label"
                              style={{ marginBottom: 4 }}
                            >
                              Level Effects
                            </div>
                            {[1, 2, 3, 4, 5].map((lv) => (
                              <div key={lv} className="level-effect-row">
                                <div className="level-effect-label">
                                  Level {lv}
                                </div>
                                <textarea
                                  className="level-effect-ta"
                                  readOnly={sk.level < lv}
                                  value={(sk.levelEffects || {})[lv] || ""}
                                  onChange={(e) =>
                                    patchLevelEffect(sk.id, lv, e.target.value)
                                  }
                                />
                              </div>
                            ))}
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })}
                {state.skills.length === 0 && (
                  <span style={{ color: "var(--muted)", fontSize: 11 }}>
                    No skills yet — add from library or manually.
                  </span>
                )}
              </div>
            </div>
          </>
        );
      }

      // ─── ACHIEVEMENTS TAB ─────────────────────────────────────────────────────────
      function AchievementsTab({ state, update }) {
        const [form, setForm] = useState({ title: "", desc: "", reward: "" });
        function addAch() {
          if (!form.title) return;
          update((s) => ({
            ...s,
            achievements: [...s.achievements, { id: uid(), ...form }],
          }));
          setForm({ title: "", desc: "", reward: "" });
        }
        function rmAch(id) {
          update((s) => ({
            ...s,
            achievements: s.achievements.filter((a) => a.id !== id),
          }));
        }

        return (
          <div className="panel">
            <div className="panel-title">
              Achievements ({state.achievements.length})
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {state.achievements.map((a) => (
                <div key={a.id} className="ach-card">
                  <div className="ach-icon">🏆</div>
                  <div className="ach-body">
                    <div className="ach-title">{a.title}</div>
                    {a.desc && <div className="ach-desc">{a.desc}</div>}
                    {a.reward && <div className="ach-reward">{a.reward}</div>}
                  </div>
                  <button
                    className="btn btn-danger btn-xs"
                    onClick={() => rmAch(a.id)}
                  >
                    ✕
                  </button>
                </div>
              ))}
              {state.achievements.length === 0 && (
                <span style={{ color: "var(--muted)", fontSize: 11 }}>
                  No achievements yet.
                </span>
              )}
            </div>
            <div className="add-form">
              <div className="field-group" style={{ flex: 2 }}>
                <label className="field-label">Title</label>
                <input
                  className="fi"
                  value={form.title}
                  onChange={(e) =>
                    setForm((f) => ({ ...f, title: e.target.value }))
                  }
                />
              </div>
              <div className="field-group" style={{ flex: 3 }}>
                <label className="field-label">Description</label>
                <input
                  className="fi"
                  value={form.desc}
                  onChange={(e) =>
                    setForm((f) => ({ ...f, desc: e.target.value }))
                  }
                />
              </div>
              <div className="field-group" style={{ flex: 2 }}>
                <label className="field-label">Reward</label>
                <input
                  className="fi"
                  value={form.reward}
                  onChange={(e) =>
                    setForm((f) => ({ ...f, reward: e.target.value }))
                  }
                />
              </div>
              <button
                className="btn btn-gold btn-sm"
                onClick={addAch}
                style={{ alignSelf: "flex-end" }}
              >
                + Add
              </button>
            </div>
          </div>
        );
      }

      // ─── ITEM POPUP ───────────────────────────────────────────────────────────────
      function ItemPopup({
        item,
        catId,
        cats,
        onClose,
        onUpdate,
        onDelete,
        onMove,
      }) {
        const [local, setLocal] = useState({ ...item });
        function patch(k, v) {
          setLocal((l) => ({ ...l, [k]: v }));
        }
        function toggleAtkType(t) {
          setLocal((l) => {
            const arr = l.attackTypes || [];
            return {
              ...l,
              attackTypes: arr.includes(t)
                ? arr.filter((x) => x !== t)
                : [...arr, t],
            };
          });
        }
        function toggleDmgType(t) {
          setLocal((l) => {
            const arr = l.damageType || [];
            return {
              ...l,
              damageType: arr.includes(t)
                ? arr.filter((x) => x !== t)
                : [...arr, t],
            };
          });
        }
        function save() {
          onUpdate(catId, local);
          onClose();
        }

        const icon = local.icon || catIcon(local.category || "default");
        const otherCats = cats.filter((c) => c.id !== catId);

        return (
          <div
            className="modal-overlay"
            onClick={(e) => {
              if (e.target === e.currentTarget) onClose();
            }}
          >
            <div className="modal-box">
              <div className="modal-title">
                <span className="modal-title-icon">{icon}</span>
                <input
                  className="fi"
                  style={{
                    flex: 1,
                    fontSize: 16,
                    fontWeight: 900,
                    letterSpacing: 2,
                    textTransform: "uppercase",
                    background: "transparent",
                    border: "none",
                    borderBottom: "1px solid var(--muted)",
                    borderRadius: 0,
                    padding: "2px 4px",
                  }}
                  value={local.name}
                  onChange={(e) => patch("name", e.target.value)}
                />
                <button className="modal-close" onClick={onClose}>
                  ✕
                </button>
              </div>

              <div className="modal-grid3" style={{ marginBottom: 10 }}>
                <div className="field-group">
                  <label className="field-label">Icon (emoji)</label>
                  <input
                    className="fi"
                    value={local.icon || ""}
                    onChange={(e) => patch("icon", e.target.value)}
                    placeholder="📦"
                  />
                </div>
                <div className="field-group">
                  <label className="field-label">Category</label>
                  <select
                    className="fi"
                    value={local.category || ""}
                    onChange={(e) => patch("category", e.target.value)}
                  >
                    <option value="">—</option>
                    {[
                      "Equipment",
                      "Weapons",
                      "Tools",
                      "Consumables",
                      "Misc",
                    ].map((c) => (
                      <option key={c}>{c}</option>
                    ))}
                  </select>
                </div>
                <div className="field-group">
                  <label className="field-label">Quantity</label>
                  <div className="modal-qty-row">
                    <button
                      className="btn btn-danger btn-icon btn-sm"
                      onClick={() =>
                        patch("qty", Math.max(0, (local.qty || 1) - 1))
                      }
                    >
                      −
                    </button>
                    <span className="qty-val">{local.qty || 1}</span>
                    <button
                      className="btn btn-success btn-icon btn-sm"
                      onClick={() => patch("qty", (local.qty || 1) + 1)}
                    >
                      +
                    </button>
                  </div>
                </div>
              </div>

              <div className="modal-section">
                <div className="modal-section-label">Attack Types</div>
                <div className="badge-group">
                  {ATK_TYPES.map((t) => (
                    <button
                      key={t}
                      className={`badge-toggle${(local.attackTypes || []).includes(t) ? " on" : ""}`}
                      onClick={() => toggleAtkType(t)}
                    >
                      {t}
                    </button>
                  ))}
                </div>
              </div>
